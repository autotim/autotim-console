# LOCAL DEVELOPMENT secrets only. Every value below is fake.
#
# This file exists so a developer can run integration tests locally
# without configuring every secret through the Settings UI by hand.
# It is NEVER used to seed staging or production — those environments
# get their secrets exclusively through the Secrets module (doc 23),
# entered via the Settings UI/API after boot, or carried in the
# private deployment repository's own (also gitignored) material.
#
# Copy to config/secrets.toml (gitignored) for local development only.
# If a value below ever matches something real, rotate it immediately
# and remove it from this file — see the security checklist in
# docs/security/public-private-boundary.md.

[oidc]
# A local Authentik/Keycloak instance for development — not a real
# identity provider.
client_id     = "autotim-dev"
client_secret = "dev-only-fake-secret-do-not-use"
issuer_url    = "https://idp.localhost.test/application/o/autotim-dev/"

[smtp]
# A local mail-catcher (e.g. Mailpit) for development.
host     = "localhost"
port     = 1025
username = "dev"
password = "dev-only-fake-password"

[dns_provider]
# A sandbox/test PowerDNS instance for development — not production DNS.
api_url   = "http://localhost:8081/api/v1"
api_token = "dev-only-fake-token-0000000000"
